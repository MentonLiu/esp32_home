<!-- 文件说明：服务端本地 Web 控制与状态展示页面。 -->
<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ESP32 Home Server</title>
    <style>
        :root {
            --bg: #f4efe7;
            --panel: rgba(255, 252, 247, 0.92);
            --ink: #1c2a2a;
            --muted: #64706f;
            --line: rgba(36, 56, 55, 0.12);
            --brand: #135d66;
            --accent: #ea6f2d;
            --danger: #bb2d3b;
            --warn: #d28b13;
            --shadow: 0 18px 45px rgba(25, 40, 39, 0.12);
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            color: var(--ink);
            font-family: "Avenir Next", "PingFang SC", "Microsoft YaHei", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(19, 93, 102, 0.2), transparent 30%),
                radial-gradient(circle at top right, rgba(234, 111, 45, 0.18), transparent 34%),
                linear-gradient(160deg, #f6f1e8, #eef5f4 52%, #f8f3ed);
            min-height: 100vh;
        }

        .page { max-width: 1120px; margin: 0 auto; padding: 24px 16px 48px; }
        .hero, .panel {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 24px;
            box-shadow: var(--shadow);
        }
        .hero { padding: 28px; display: grid; gap: 18px; }
        .hero-top { display: flex; justify-content: space-between; gap: 16px; align-items: start; flex-wrap: wrap; }
        h1, h2 { margin: 0; }
        .sub { margin: 10px 0 0; max-width: 720px; color: var(--muted); line-height: 1.7; font-size: 0.98rem; }
        .hero-badges, .nav, .button-row, .preset-row { display: flex; flex-wrap: wrap; gap: 10px; }
        .badge, .nav a {
            border-radius: 999px;
            padding: 10px 14px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            color: var(--ink);
            font-weight: 600;
        }
        .grid { display: grid; grid-template-columns: 1.15fr 0.85fr; gap: 16px; margin-top: 16px; }
        .stack { display: grid; gap: 16px; }
        .panel { padding: 20px; }
        .title-row { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 16px; }
        .tiny { color: var(--muted); font-size: 0.88rem; }
        .sensor-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
        .sensor-card { border: 1px solid var(--line); border-radius: 18px; padding: 14px; background: rgba(255,255,255,0.74); }
        .sensor-card .label { font-size: 0.82rem; color: var(--muted); margin-bottom: 8px; }
        .sensor-card .value { font-size: 1.45rem; font-weight: 700; }
        .status-banner { border-radius: 18px; padding: 14px 16px; background: linear-gradient(135deg, rgba(19, 93, 102, 0.08), rgba(234,111,45,0.12)); border: 1px solid var(--line); display: grid; gap: 4px; }
        .status-banner strong { font-size: 1rem; }
        .error { color: var(--danger); }
        .controls { display: grid; gap: 14px; }
        button {
            border: 0;
            border-radius: 14px;
            padding: 12px 14px;
            min-width: 84px;
            font-size: 0.95rem;
            font-weight: 700;
            color: white;
            background: var(--brand);
        }
        button.secondary { background: var(--accent); }
        button.warn { background: var(--warn); }
        button.danger { background: var(--danger); }
        input[type="range"] { width: 100%; accent-color: var(--brand); }
        .range-label { display: flex; justify-content: space-between; align-items: center; font-size: 0.92rem; margin-bottom: 8px; }
        .log { border: 1px dashed var(--line); background: rgba(255,255,255,0.55); border-radius: 16px; padding: 12px 14px; color: var(--muted); min-height: 64px; line-height: 1.6; }
        @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>

<body>
    <div class="page">
        <section class="hero">
            <div class="hero-top">
                <div>
                    <h1>ESP32 智能家居服务端</h1>
                    <p class="sub">当前页面只保留服务端控制与状态展示。项目结构说明已经移到仓库根目录，红外控制也改成了给 ESP8266 发送字符串命令。</p>
                </div>
                <div class="hero-badges">
                    <span class="badge" id="modeBadge">模式加载中</span>
                    <span class="badge" id="ipBadge">IP 加载中</span>
                </div>
            </div>
            <div class="nav">
                <a href="/api/status" target="_blank" rel="noreferrer">查看状态接口</a>
            </div>
        </section>

        <div class="grid">
            <div class="stack">
                <section class="panel">
                    <div class="title-row">
                        <h2>实时传感器</h2>
                        <span class="tiny" id="updatedAt">等待首次采样</span>
                    </div>
                    <div class="sensor-grid">
                        <article class="sensor-card"><div class="label">温度</div><div class="value" id="temperatureValue">--</div></article>
                        <article class="sensor-card"><div class="label">湿度</div><div class="value" id="humidityValue">--</div></article>
                        <article class="sensor-card"><div class="label">光照</div><div class="value" id="lightValue">--</div></article>
                        <article class="sensor-card"><div class="label">MQ2 烟雾</div><div class="value" id="smokeValue">--</div></article>
                        <article class="sensor-card"><div class="label">烟雾等级</div><div class="value" id="smokeLevelValue">--</div></article>
                        <article class="sensor-card"><div class="label">火焰状态</div><div class="value" id="flameValue">--</div></article>
                    </div>
                </section>

                <section class="panel">
                    <div class="title-row">
                        <h2>系统状态</h2>
                        <span class="tiny" id="fanPowerText">风扇电源关闭</span>
                    </div>
                    <div class="status-banner">
                        <strong id="systemHeadline">系统已待命</strong>
                        <span id="systemDetails">采样、控制与自动化状态将显示在这里。</span>
                        <span class="tiny error" id="errorMessage"></span>
                    </div>
                </section>
            </div>

            <div class="stack">
                <section class="panel">
                    <div class="title-row">
                        <h2>窗帘控制</h2>
                        <span class="tiny" id="curtainAngleText">角度 0°</span>
                    </div>
                    <div class="controls">
                        <div>
                            <div class="range-label"><span>无极调节</span><strong id="curtainRangeValue">0°</strong></div>
                            <input id="curtainRange" type="range" min="0" max="180" value="0" />
                        </div>
                        <div class="preset-row">
                            <button data-curtain-preset="0" class="danger">关闭</button>
                            <button data-curtain-preset="1">1/4</button>
                            <button data-curtain-preset="2">半开</button>
                            <button data-curtain-preset="3" class="secondary">3/4</button>
                            <button data-curtain-preset="4" class="warn">打开</button>
                        </div>
                    </div>
                </section>

                <section class="panel">
                    <div class="title-row">
                        <h2>风扇控制</h2>
                        <span class="tiny" id="fanSpeedText">速度 0%</span>
                    </div>
                    <div class="controls">
                        <div class="button-row">
                            <button id="fanPowerOnBtn">开机</button>
                            <button id="fanPowerOffBtn" class="danger">关机</button>
                            <button data-fan-mode="low">弱</button>
                            <button data-fan-mode="medium" class="secondary">中</button>
                            <button data-fan-mode="high" class="warn">强</button>
                        </div>
                        <div>
                            <div class="range-label"><span>百分比调速</span><strong id="fanRangeValue">0%</strong></div>
                            <input id="fanRange" type="range" min="0" max="100" value="0" />
                        </div>
                    </div>
                </section>

                <section class="panel">
                    <div class="title-row">
                        <h2>红外桥接</h2>
                        <span class="tiny">向 ESP8266 发送字符串命令</span>
                    </div>
                    <div class="controls">
                        <div class="button-row">
                            <button data-ir-command="ac_power">空调开关</button>
                            <button data-ir-command="ac_temp_up">温度升高</button>
                            <button data-ir-command="ac_temp_down">温度降低</button>
                            <button data-ir-command="ac_mode" class="secondary">模式切换</button>
                        </div>
                        <div class="log" id="actionLog">最近动作会显示在这里。</div>
                    </div>
                </section>
            </div>
        </div>
    </div>

    <script>
        const curtainRange = document.getElementById('curtainRange');
        const fanRange = document.getElementById('fanRange');
        let pendingCurtainTimer = 0;
        let pendingFanTimer = 0;

        function fmt(value, suffix) {
            if (value === undefined || value === null || Number.isNaN(Number(value))) return '--';
            return `${value}${suffix}`;
        }

        async function sendCommand(body, label) {
            try {
                const response = await fetch('/api/control', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const result = await response.json();
                document.getElementById('actionLog').textContent = `${label}：${result.message || JSON.stringify(body)}`;
                await fetchStatus();
            } catch (error) {
                document.getElementById('actionLog').textContent = `动作失败：${error.message}`;
            }
        }

        async function fetchStatus() {
            try {
                const response = await fetch('/api/status', { cache: 'no-store' });
                const data = await response.json();

                document.getElementById('modeBadge').textContent = `模式 ${data.mode}`;
                document.getElementById('ipBadge').textContent = `IP ${data.ip}`;
                document.getElementById('updatedAt').textContent = `最近刷新 ${new Date().toLocaleTimeString()}`;

                document.getElementById('temperatureValue').textContent = fmt(Number(data.temperatureC).toFixed(1), ' °C');
                document.getElementById('humidityValue').textContent = fmt(Number(data.humidityPercent).toFixed(1), ' %');
                document.getElementById('lightValue').textContent = fmt(data.lightPercent, ' %');
                document.getElementById('smokeValue').textContent = fmt(data.mq2Percent, ' %');
                document.getElementById('smokeLevelValue').textContent = data.smokeLevel || '--';
                document.getElementById('flameValue').textContent = data.flameDetected ? '检测到火焰' : '未检测到';

                document.getElementById('curtainAngleText').textContent = `角度 ${data.curtainAngle}°`;
                document.getElementById('curtainRangeValue').textContent = `${data.curtainAngle}°`;
                document.getElementById('fanSpeedText').textContent = `速度 ${data.fanSpeedPercent}%`;
                document.getElementById('fanRangeValue').textContent = `${data.fanSpeedPercent}%`;
                document.getElementById('fanPowerText').textContent = data.fanPowerOn ? '风扇电源开启' : '风扇电源关闭';

                curtainRange.value = data.curtainAngle;
                fanRange.value = data.fanSpeedPercent;

                const headline = data.flameDetected
                    ? '火焰传感器已触发'
                    : data.mq2Percent >= 75
                        ? '烟雾浓度过高，已自动联动风扇'
                        : data.mode === 'cloud'
                            ? '系统运行在路由器联网模式'
                            : '系统运行在本地热点模式';
                const details = `风扇电源 ${data.fanPowerOn ? '开' : '关'} · 风扇 ${data.fanSpeedPercent}% · 窗帘 ${data.curtainAngle}°`;

                document.getElementById('systemHeadline').textContent = headline;
                document.getElementById('systemDetails').textContent = details;
                document.getElementById('errorMessage').textContent = data.error ? `传感器异常：${data.errorMessage}` : '';
            } catch (error) {
                document.getElementById('systemHeadline').textContent = '状态拉取失败';
                document.getElementById('systemDetails').textContent = error.message;
                document.getElementById('errorMessage').textContent = '';
            }
        }

        curtainRange.addEventListener('input', (event) => {
            const angle = Number(event.target.value);
            document.getElementById('curtainRangeValue').textContent = `${angle}°`;
            clearTimeout(pendingCurtainTimer);
            pendingCurtainTimer = setTimeout(() => sendCommand({ device: 'curtain', angle }, '窗帘角度调整'), 120);
        });

        fanRange.addEventListener('input', (event) => {
            const speedPercent = Number(event.target.value);
            document.getElementById('fanRangeValue').textContent = `${speedPercent}%`;
            clearTimeout(pendingFanTimer);
            pendingFanTimer = setTimeout(() => sendCommand({ device: 'fan', speedPercent }, '风扇速度调整'), 120);
        });

        document.querySelectorAll('[data-curtain-preset]').forEach((button) => {
            button.addEventListener('click', () => {
                sendCommand({ device: 'curtain', preset: Number(button.dataset.curtainPreset) }, '窗帘预设控制');
            });
        });

        document.getElementById('fanPowerOnBtn').addEventListener('click', () => sendCommand({ device: 'fan', power: 'on' }, '风扇开机'));
        document.getElementById('fanPowerOffBtn').addEventListener('click', () => sendCommand({ device: 'fan', power: 'off' }, '风扇关机'));

        document.querySelectorAll('[data-fan-mode]').forEach((button) => {
            button.addEventListener('click', () => {
                sendCommand({ device: 'fan', mode: button.dataset.fanMode }, '风扇模式控制');
            });
        });

        document.querySelectorAll('[data-ir-command]').forEach((button) => {
            button.addEventListener('click', () => {
                sendCommand({ device: 'ir', command: button.dataset.irCommand }, `红外命令 ${button.dataset.irCommand}`);
            });
        });

        setInterval(fetchStatus, 500);
        fetchStatus();
    </script>
</body>

</html>
